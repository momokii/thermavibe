services:
  postgres:
    image: postgres:16-alpine
    container_name: vibeprint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thermavibe}
      POSTGRES_USER: ${POSTGRES_USER:-thermavibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thermavibe}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vibeprint-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thermavibe}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibeprint-app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    group_add:
      - "44"   # video — /dev/video* camera access
      - "7"    # lp — USB printer access
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BIND_HOST:-127.0.0.1}:${APP_PORT:-8000}:8000"
    environment:
      # --- Infrastructure (deployment-time, not in admin panel) ---
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-thermavibe}:${POSTGRES_PASSWORD:-thermavibe}@postgres:5432/${POSTGRES_DB:-thermavibe}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-24}
      # --- Hardware detection (deployment-time, machine-specific) ---
      PRINTER_AUTO_DETECT: ${PRINTER_AUTO_DETECT:-true}
      PRINTER_HOTPLUG_INTERVAL_SECONDS: ${PRINTER_HOTPLUG_INTERVAL_SECONDS:-30}
      CAMERA_DEVICE_INDEX: ${CAMERA_DEVICE_INDEX:-0}
      # --- Digital Sharing (all optional — unset = today's LAN/loopback behavior) ---
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      SHARE_BRAND_NAME: ${SHARE_BRAND_NAME:-}
      SHARE_BRAND_HANDLE: ${SHARE_BRAND_HANDLE:-}
      SHARE_BRAND_COLOR: ${SHARE_BRAND_COLOR:-#000000}
    volumes:
      - app-logs:/app/logs
      - app-composites:/tmp/vibeprint
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - vibeprint-net
    # Device mappings are auto-generated by scripts/start-docker.sh based on
    # which /dev/video* devices actually exist on the host.
    # For manual docker compose up, devices are optional — the camera service
    # will fall back to mock mode if no camera is available.

  # Cloudflare Tunnel sidecar — enables public share URLs (digital sharing)
  # without exposing any inbound port. Strictly opt-in via Compose profiles:
  #   - `make dev` / `make prod` → cloudflared is NOT started
  #   - `make dev-tunnel` / `make prod-tunnel` → cloudflared starts alongside app
  # Failure of this service (bad token, network down) cannot break the app:
  # the app has no depends_on:cloudflared dependency.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    profiles: ["tunnel"]
    depends_on:
      - app
    networks:
      - vibeprint-net

volumes:
  postgres-data:
    name: vibeprint-postgres-data
  app-logs:
    name: vibeprint-app-logs
  app-composites:
    name: vibeprint-app-composites

networks:
  vibeprint-net:
    driver: bridge
    name: vibeprint-net
