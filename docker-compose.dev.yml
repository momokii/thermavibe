# =============================================================================
# docker-compose.dev.yml — Development overrides
# =============================================================================
#
# Merged ON TOP of docker-compose.yml when you run: make dev
#
# Overrides:
#   - Hot-reload: backend source mounted as volume, uvicorn uses --reload
#   - Dev container names suffixed with "-dev"
#   - Postgres exposed on host port 5433 (for local tools)
#   - All settings from .env passed through
#
# Runtime settings (AI, payment, photobooth, etc.) are seeded from env vars
# into the database on first run, then managed via admin panel.
# =============================================================================

services:
  app:
    build:
      context: .
      target: backend-runtime
    container_name: vibeprint-app-dev
    user: "0:0"
    group_add:
      - "44"   # video — for /dev/video* camera access
      - "7"    # lp — for USB printer access
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./backend/app:/app/app
      - app-composites:/tmp/vibeprint

    env_file:
      - .env

    environment:
      # --- Infrastructure ---
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-thermavibe}:${POSTGRES_PASSWORD:-thermavibe}@postgres:5432/${POSTGRES_DB:-thermavibe}

      # --- Hardware detection (machine-specific) ---
      PRINTER_AUTO_DETECT: ${PRINTER_AUTO_DETECT:-true}
      PRINTER_HOTPLUG_INTERVAL_SECONDS: ${PRINTER_HOTPLUG_INTERVAL_SECONDS:-30}
      CAMERA_DEVICE_INDEX: ${CAMERA_DEVICE_INDEX:-0}

      # --- Admin ---
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-24}

      # --- Initial seeds (override Python defaults from .env, then managed via admin panel) ---
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      PAYMENT_ENABLED: ${PAYMENT_ENABLED:-false}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION:-false}
      XENDIT_API_KEY: ${XENDIT_API_KEY:-}
      PRINTER_VENDOR_ID: ${PRINTER_VENDOR_ID:-0x04b8}
      PRINTER_PRODUCT_ID: ${PRINTER_PRODUCT_ID:-0x0e15}

    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    networks:
      - vibeprint-net

  postgres:
    container_name: vibeprint-postgres-dev
    ports:
      - "5433:5432"
    networks:
      - vibeprint-net

volumes:
  app-composites:
    name: vibeprint-app-composites

networks:
  vibeprint-net:
    driver: bridge
    name: vibeprint-net
